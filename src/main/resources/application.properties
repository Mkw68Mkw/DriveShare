quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=driveshare
quarkus.datasource.password=driveshare
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/driveshare

quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# Swagger UI / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=DriveShare API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=REST API fuer DriveShare (Fahrzeuge, Reservationen, Fahrten, Kosten, Benutzer)